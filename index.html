      ;(function () {
        var path = window.location.pathname
        if (path === '/' || /\/(index|404)\.html\/?$/.test(path)) return
        if (window.location.hash && window.location.hash.length > 1) return
        window.location.replace(

            path.replace(/^\/+/, '').replace(/\/$/, '') +
